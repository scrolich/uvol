<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>творческое объединение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f0e8;
            color: #2c2416;
            overflow-x: auto;
            overflow-y: hidden;
            height: 100vh;
            cursor: grab;
            user-select: none;
        }

        body:active {
            cursor: grabbing;
        }

        body::-webkit-scrollbar {
            height: 4px;
        }

        body::-webkit-scrollbar-track {
            background: #e8e0d5;
        }

        body::-webkit-scrollbar-thumb {
            background: #c9a96e;
            border-radius: 2px;
        }

        /* ---- Плёнка ---- */
        .film-strip {
            display: flex;
            height: 100vh;
            padding: 0 18vw;
            align-items: center;
            gap: 0;
        }

        /* ---- Перфорация ---- */
        .perforation-top,
        .perforation-bottom {
            position: fixed;
            left: 0;
            width: 100%;
            height: 6px;
            z-index: 20;
            pointer-events: none;
            background: repeating-linear-gradient(to right,
                    #f5f0e8 0px,
                    #f5f0e8 16px,
                    transparent 16px,
                    transparent 22px);
        }

        .perforation-top {
            top: 18px;
        }

        .perforation-bottom {
            bottom: 18px;
        }

        /* ---- Карточка ---- */
        .frame {
            flex-shrink: 0;
            width: 420px;
            margin-right: 80px;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .frame:hover {
            transform: translateY(-8px);
        }

        .frame-title {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 400;
            color: #3d3222;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .frame-img-wrap {
            width: 100%;
            height: 520px;
            overflow: hidden;
            border-radius: 3px;
            position: relative;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.1);
        }

        .frame-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) sepia(10%);
            transition: filter 0.5s, transform 0.5s;
            background: #e8e0d5;
        }

        .frame:hover .frame-img-wrap img {
            filter: grayscale(0%) sepia(0%);
            transform: scale(1.03);
        }

        /* ---- Кнопка "Обо мне" ---- */
        .about-link {
            position: fixed;
            top: 27px;
            right: 30px;
            z-index: 30;
            color: #5c4a32;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1px solid #5c4a32;
            padding: 8px 18px;
            border-radius: 2px;
            transition: all 0.3s;
            background: rgba(245, 240, 232, 0.7);
            backdrop-filter: blur(6px);
        }

        .about-link:hover {
            background: #5c4a32;
            color: #f5f0e8;
        }

        /* ---- Подпись внизу ---- */
        .signature {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #b8a68b;
            pointer-events: none;
            z-index: 10;
            background: rgba(245, 240, 232, 0.7);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* ---- Адаптив ---- */
        @media (max-width: 768px) {
            .film-strip {
                padding: 0 10vw;
            }

            .frame {
                width: 300px;
                margin-right: 50px;
            }

            .frame-img-wrap {
                height: 380px;
            }

            .frame-title {
                font-size: 0.9rem;
            }


            .about-link {
                top: 16px;
                right: 16px;
                font-size: 0.65rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>


    <!-- Перфорация -->
    <div class="perforation-top"></div>
    <div class="perforation-bottom"></div>

    <!-- Лента -->
    <div class="film-strip" id="filmStrip">
        <!-- Заполняется из JS -->
    </div>

    <!-- Кнопка "Обо мне" -->
    <a href="about.html" class="about-link">Обо мне</a>

    <div class="signature">творческое объединение</div>

    <script>
        const projects = [
            {
                title: "Игровые короткие метры",
                img: "IMG_2443.PNG",
                link: "game.html"
            },
            {
                title: "Документальные короткие метры",
                img: "IMG_2439.PNG",
                link: "doc.html"
            },
            {
                title: "Вертикальный формат",
                img: "IMG_2446.PNG",
                link: "vertical.html"
            }
        ];

        const strip = document.getElementById('filmStrip');

        projects.forEach(p => {
            const frame = document.createElement('div');
            frame.className = 'frame';
            frame.innerHTML = `
              <div class="frame-title">${p.title}</div>
              <div class="frame-img-wrap">
                <img src="${p.img}" alt="${p.title}" loading="lazy">
              </div>
            `;
            strip.appendChild(frame);
        });
    </script>
</body>
</html>
